# Netlify config for the AfriTask frontend (Next.js).
#
# This file lives INSIDE client/ on purpose: the Netlify site's Base directory
# is set to "client", and Netlify reads netlify.toml from the base directory —
# a root-level netlify.toml would be ignored.
#
# WHY THIS EXISTS: this is a hybrid/SSR Next app (no output: "export" in
# next.config.mjs), so it MUST run through the Netlify Next.js runtime. Without
# the runtime, Netlify serves .next as plain static files and every route hits
# Netlify's default "Page not found" 404 — exactly the bug we hit after moving
# to the monorepo.
#
# ALSO REQUIRED (UI): the site's "Publish directory" field must be EMPTY. The
# runtime sets the publish location itself; a stale manual value (e.g. .next,
# out, build) left over from the old repo bypasses the runtime and 404s.

[build]
  command = "npm run build"

[build.environment]
  # Next 16 needs a modern Node; pin it so builds don't fall back to an old default.
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
